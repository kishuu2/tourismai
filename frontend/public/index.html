<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root">

  </div>
  <script>
    $(document).ready(function () {
      $(".mode").on("click", function () {
        if ($("body").hasClass("dark")) {
          $("body").removeClass("dark");
          $(".navbar").css({ "background-color": "white", "transition": ".3s all ease-in-out" });
          $(".d-menu").css({ "background-color": "white", "transition": ".3s all ease-in-out", "border": "1px solid purple" });
          $(".navbar-toggler").css({ "background-color": "white" });
          $("#change").text("Dark");
          $(".nav-link").css("color", "black");
          $(".navbar-brand").css("color", "black");
          $(".d-text").css("color", "black");
          $(".main-1").removeClass("bor-2");
          $(".moon").css({ "display": "inline", "transition": ".3s all ease-in-out" })
          $(".sun").css({ "display": "none", "transition": ".3s all ease-in-out" })
        }
        else {
          $("body").addClass("dark");
          $("#change").text("Light");
          $(".nav-link").css("color", "white");
          $(".d-text").css("color", "white");
          $(".navbar-toggler").css({ "background-color": "white" });
          $(".navbar-brand").css("color", "white");
          $(".navbar").css({ "background-color": "black", "transition": ".3s all ease-in-out" });
          $(".d-menu").css({ "background-color": "black", "transition": ".3s all ease-in-out" });
          $(".main-1").addClass("bor-1")
          $(".moon").css({ "display": "none", "transition": ".3s all ease-in-out" })
          $(".sun").css({ "display": "inline", "transition": ".3s all ease-in-out" })
        }
      });

      $("#r1").click(function () {
        $(".hide2").fadeIn(2000);
      });



      $("#r2").click(function () {
        $(".hide3").fadeIn(2000);
      });

      $("#r3").click(function () {
        $(".hide4").fadeIn(2000);
      });
      $("#r4").click(function () {
        $(".hide5").fadeIn(2000);
      });

    });
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }
  </script>
</body>
