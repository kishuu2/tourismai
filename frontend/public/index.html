<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://cdn.canvasjs.com/canvasjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <meta name="description" content="Best Toursit Packages and Enjoy your self or Family." />
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <title>Diamond Tourism</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root">

  </div>
  <script>
    $(document).ready(function () {
      $(".mode").on("click", function () {
        if ($("body").hasClass("dark")) {
          $("body").removeClass("dark");
          $(".navbar").css({ "background-color": "white", "transition": ".3s all ease-in-out" });
          $(".d-menu").css({ "background-color": "white", "transition": ".3s all ease-in-out", "border": "1px solid purple" });
          $(".navbar-toggler").css({ "background-color": "white" });
          $("#change").text("Dark");
          $(".nav-link").css("color", "black");
          $(".navbar-brand").css("color", "black");
          $(".d-text").css("color", "black");
          $(".main-1").removeClass("bor-2");
          $(".moon").css({ "display": "inline", "transition": ".3s all ease-in-out" })
          $(".sun").css({ "display": "none", "transition": ".3s all ease-in-out" })
        }
        else {
          $("body").addClass("dark");
          $("#change").text("Light");
          $(".nav-link").css("color", "white");
          $(".d-text").css("color", "white");
          $(".navbar-toggler").css({ "background-color": "white" });
          $(".navbar-brand").css("color", "white");
          $(".navbar").css({ "background-color": "black", "transition": ".3s all ease-in-out" });
          $(".d-menu").css({ "background-color": "black", "transition": ".3s all ease-in-out" });
          $(".main-1").addClass("bor-1")
          $(".moon").css({ "display": "none", "transition": ".3s all ease-in-out" })
          $(".sun").css({ "display": "inline", "transition": ".3s all ease-in-out" })
        }
      });

      $("#r1").click(function () {
        $(".hide2").fadeIn(2000);
      });



      $("#r2").click(function () {
        $(".hide3").fadeIn(2000);
      });

      $("#r3").click(function () {
        $(".hide4").fadeIn(2000);
      });
      $("#r4").click(function () {
        $(".hide5").fadeIn(2000);
      });

    });
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
    }
  </script>
</body>

</html>
